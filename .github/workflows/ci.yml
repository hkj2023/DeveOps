name: ML DevOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  data-prep:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Data Prep
        run: |
          docker build -t dataprep-app -f Dockerfile.prep .
          docker run --rm dataprep-app

  training:
    runs-on: windows-latest
    needs: data-prep
    steps:
      - uses: actions/checkout@v4
      - name: Run Training
        run: |
          docker build -t randomforest-app -f Dockerfile.train .
          docker run --rm randomforest-app
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: outputs/defect_prediction.pkl

  testing:
    runs-on: windows-latest
    needs: training
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies for testing
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas scikit-learn joblib
      - name: Run Pytest suite and generate report
        run: |
          pytest tests/ --maxfail=1 --disable-warnings -q --junitxml=pytest-report.xml
      - name: Upload Pytest Report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

  evaluation:
    runs-on: windows-latest
    needs: testing
    steps:
      - uses: actions/checkout@v4
      - name: Run Evaluation
        run: |
          docker build -t eval-app -f Dockerfile.eval .
          docker run --rm eval-app
      - name: Upload Metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json
