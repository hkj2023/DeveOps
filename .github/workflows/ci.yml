name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  defect-prediction:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python RandomForest.py
      - uses: actions/upload-artifact@v4
        with:
          name: defect_predictions
          path: defect_predictions.json

  anomaly-detection:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python IsolationForest.py
      - uses: actions/upload-artifact@v4
        with:
          name: anomaly_decision
          path: anomaly_decision.json

  reinforcement-learning:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python RL_QLearn.py
      - uses: actions/upload-artifact@v4
        with:
          name: policy
          path: policy.json

  orchestration:
    runs-on: windows-latest
    needs: [defect-prediction, anomaly-detection, reinforcement-learning]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - uses: actions/download-artifact@v4
        with:
          name: defect_predictions
      - uses: actions/download-artifact@v4
        with:
          name: anomaly_decision
      - uses: actions/download-artifact@v4
        with:
          name: policy
      - run: python orchestration.py
