name: ML DevOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  checks: write      # <-- allow test-reporter to publish results
  contents: read     # <-- default needed for checkout

jobs:
  data-prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Data Prep
        run: |
          docker build -t dataprep-app -f Dockerfile.prep .
          docker run --rm dataprep-app

  training:
    runs-on: ubuntu-latest
    needs: data-prep
    steps:
      - uses: actions/checkout@v4
      - name: Run Training
        run: |
          docker build -t randomforest-app -f Dockerfile.train .
          docker run --rm randomforest-app
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: outputs/defect_prediction.pkl
  testing:
   runs-on: ubuntu-latest
   needs: training
   steps:
    - uses: actions/checkout@v4
    - name: Install dependencies for testing
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas==2.2.2 scikit-learn==1.3.2 joblib==1.4.2
    - name: Run Pytest suite and generate report
      run: |
        pytest tests/ --maxfail=1 --disable-warnings -q --junitxml=pytest-report.xml
    - name: Publish Test Results to GitHub Actions
      uses: dorny/test-reporter@v1
      with:
        name: Pytest Results
        path: pytest-report.xml
        reporter: java-junit
    - name: Upload Pytest Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pytest-report
        path: pytest-report.xml

  

  evaluation:
    runs-on: ubuntu-latest
    needs: testing
    steps:
      - uses: actions/checkout@v4
      - name: Run Evaluation
        run: |
          docker build -t eval-app -f Dockerfile.eval .
          docker run --rm eval-app
      - name: Upload Metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json
