version: "3.9"

services:
  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./ML_Final_Final.csv:/app/ML_Final_Final.csv
      - ./outputs:/app/outputs
    command: python RandomForest.py

  prep:
    build:
      context: .
      dockerfile: Dockerfile.prep
    volumes:
      - ./ML_Final_Final.csv:/app/ML_Final_Final.csv
      - ./outputs:/app/outputs
    command: python prep.py

  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    volumes:
      - ./outputs:/app/outputs
    command: python inference.py
