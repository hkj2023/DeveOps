version: "3.9"

services:
  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./ML_Final_Final.csv:/app/ML_Final_Final.csv
      - ./outputs:/app/outputs
    command: python RandomForest.py

inference:
  build:
    context: .
    dockerfile: Dockerfile.inference
  volumes:
    - ./outputs:/app/outputs   # contains defect_prediction.pkl + inference_output.csv
  command: python inference.py
