services:
  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    command: python RandomForest.py
    volumes:
      - ./ML_Final_Final.csv:/app/ML_Final_Final.csv
      - ./outputs:/app/outputs

  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    command: python inference.py
    volumes:
      - ./ML_Final_Final.csv:/app/ML_Final_Final.csv
      - ./outputs:/app/outputs
    depends_on:
      - train
