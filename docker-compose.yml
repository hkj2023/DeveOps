version: "3.9"

services:
  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./ML_Final_Final.csv:/app/ML_Final_Final.csv   # mount dataset
      - ./outputs:/app/outputs                        # mount outputs folder
    command: python RandomForest.py

  inference:
  build:
    context: .
    dockerfile: Dockerfile.inference
  volumes:
    - ./outputs:/app/outputs   # mount trained model here
    - ./new_data.csv:/app/new_data.csv   # optional: mount new data for predictions
  command: python inference.py

