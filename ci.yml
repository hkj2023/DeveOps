name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  defect-prediction:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'   # ✅ Consistent version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run defect prediction
        run: |
          python RandomForest.py   # ✅ Updated script
        # This generates defect_predictions.json

      - name: Upload predictions artifact
        uses: actions/upload-artifact@v4   # ✅ Updated to v4
        with:
          name: defect_predictions
          path: defect_predictions.json

  orchestration:
    runs-on: windows-latest
    needs: defect-prediction
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Download predictions artifact
        uses: actions/download-artifact@v4   # ✅ Updated to v4
        with:
          name: defect_predictions

      - name: Run orchestration script
        run: |
          python orchestration.py   # ✅ Keep only if you actually have this file
