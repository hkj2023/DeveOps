name: ML CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest

  train:
    runs-on: windows-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - name: Train model
        run: python RandomForest.py
      - uses: actions/upload-artifact@v4
        with:
          name: defect_prediction
          path: defect_prediction.pkl

  build-docker:
    runs-on: windows-latest
    needs: train
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t app -f Dockerfile .

  deploy:
    runs-on: windows-latest
    needs: build-docker
    steps:
      - name: Run container locally
        run: docker run -d -p 5000:5000 app

  serve-api:
    runs-on: windows-latest
    needs: deploy
    steps:
      - name: Test API endpoint
        run: |
          curl http://localhost:5000/predict -X POST -H "Content-Type: application/json" -d '{"input":[1,2,3]}'
